name: Deploy GitHub Pages

# Publishes the static site in docs/ (the Smart Assignment overview page) to
# GitHub Pages. Runs automatically on every merge/push to main, and can also be
# triggered manually from Actions -> Deploy GitHub Pages -> Run workflow.
# One-time setup: in the repo, go to Settings -> Pages and set
# "Build and deployment" -> Source to "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Runner is configurable so this workflow works under an org IP allow list.
    # Standard GitHub-hosted runners use ephemeral IPs from a large, changing
    # pool; if the org enables an IP allow list, actions/checkout is rejected
    # with "403 ... IP allow list enabled, and <ip> is not permitted". To fix,
    # set a repo/org Actions variable CI_RUNNER to the label of a runner whose
    # egress IP is on the allow list (a self-hosted runner, or a GitHub-hosted
    # larger runner with a static IP range). The same variable is used by every
    # workflow in this repo. With CI_RUNNER unset it falls back to ubuntu-latest,
    # which is correct for repos without an IP allow list.
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install the local ds-utils-lite dependency
        # ds-utils-lite is vendored under smart_assignment/ and resolved from a
        # local path (see [tool.uv.sources] in pyproject.toml); it is not on
        # PyPI, so install it editable first to satisfy the main package's
        # dependency on it (mirrors ci.yml).
        run: pip install -e smart_assignment/ds_utils_lite

      - name: Install package
        run: pip install -e .

      - name: Regenerate docs/index.html from live workflow output
        # Deterministic, offline generation so the published page always matches
        # the mock demo data (and never depends on live SQL / a network geocoder).
        env:
          SMART_ASSIGNMENT_GEOCODER: mock
          SMART_ASSIGNMENT_DATA_SOURCE: mock
          SMART_ASSIGNMENT_USE_ROUTE_SLOT_SCORING: "true"
        run: python3 scripts/generate_page.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload docs/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
