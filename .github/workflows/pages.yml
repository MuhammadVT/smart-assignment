name: Deploy GitHub Pages

# Publishes the static site in docs/ (the Smart Assignment overview page) to
# GitHub Pages. One-time setup: in the repo, go to Settings -> Pages and set
# "Build and deployment" -> Source to "GitHub Actions".

on:
  push:
    branches: [main]
    # The page is generated from the code, so republish when either changes.
    paths:
      - "docs/**"
      - "smart_assignment/**"
      - "scripts/generate_page.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e .

      - name: Regenerate docs/index.html from live workflow output
        run: python3 scripts/generate_page.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload docs/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
